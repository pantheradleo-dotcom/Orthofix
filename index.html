<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrthoFix V3 — Assistant rédactionnel local</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <header class="sidebar-header">
      <h1>✏️ OrthoFix <span>V3</span></h1>
      <p>Assistant rédactionnel local (Ollama)</p>
    </header>

    <section class="panel">
      <h2>Profils rapides</h2>
      <div id="profiles" class="chip-grid"></div>
    </section>

    <section class="panel">
      <h2>Configuration locale</h2>
      <div class="field">
        <label for="ollamaUrl">URL Ollama</label>
        <input id="ollamaUrl" type="text" placeholder="http://localhost:11434" />
      </div>
      <div class="field">
        <label for="defaultModel">Modèle par défaut</label>
        <input id="defaultModel" type="text" placeholder="gemma3:4b" />
      </div>
      <div class="row">
        <button class="btn btn-soft" id="testConnectionBtn">Tester</button>
        <button class="btn btn-soft" id="refreshModelsBtn">Modèles</button>
      </div>
      <div id="statusBanner" class="status info">Prêt.</div>
      <div class="models" id="modelsPanel" hidden>
        <div class="models-head">
          <strong>Modèles détectés</strong>
          <button class="btn btn-tiny" id="syncModelBtn">Utiliser sélection</button>
        </div>
        <ul id="modelsList"></ul>
      </div>
    </section>

    <section class="panel">
      <h2>Historique</h2>
      <div class="row compact">
        <select id="historyFilter">
          <option value="all">Tout</option>
          <option value="favorites">Favoris</option>
          <option value="today">Aujourd'hui</option>
        </select>
        <button class="btn btn-soft" id="clearHistoryBtn">Vider</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>
  </aside>

  <main class="workspace">
    <section class="work-card">
      <div class="work-head">
        <h2>Zone de travail</h2>
        <div class="head-actions">
          <button class="btn btn-soft" id="focusModeBtn">Mode focus</button>
          <label class="range-wrap">Hauteur
            <input type="range" id="editorHeight" min="180" max="560" step="20" value="280" />
          </label>
        </div>
      </div>

      <div class="field">
        <label for="inputText">Texte source</label>
        <textarea id="inputText" rows="10" placeholder="Rédigez ou collez votre texte ici…"></textarea>
        <div id="charCount" class="meta">0 caractère · 0 mot</div>
      </div>

      <div class="workflow-grid">
        <div class="field">
          <label>Mode</label>
          <div id="modeGroup" class="chip-grid"></div>
        </div>
        <div class="field">
          <label>Tonalité</label>
          <div id="toneGroup" class="chip-grid"></div>
        </div>
      </div>

      <div class="workflow-grid">
        <div class="field">
          <label>Intensité</label>
          <div id="intensityGroup" class="chip-grid"></div>
        </div>
        <div class="field">
          <label for="variantCount">Nombre de variantes</label>
          <select id="variantCount">
            <option value="1">1 variante</option>
            <option value="2">2 variantes</option>
            <option value="3">3 variantes</option>
            <option value="4">4 variantes</option>
          </select>
        </div>
      </div>

      <div class="row">
        <button class="btn btn-primary" id="runBtn">Lancer</button>
        <button class="btn btn-soft" id="saveDefaultsBtn">Enregistrer comme défaut</button>
        <button class="btn btn-soft" id="clearViewBtn">Effacer vue</button>
      </div>
    </section>

    <section id="resultCard" class="result-card" hidden>
      <header>
        <h3>Résultats</h3>
        <div id="resultMeta" class="meta-badge">—</div>
      </header>
      <article class="result-block">
        <h4>Texte corrigé</h4>
        <div id="correctedText" class="text-box"></div>
        <div class="row wrap">
          <button class="btn btn-soft" id="copyCorrectedBtn">Copier</button>
          <button class="btn btn-soft" id="reuseCorrectedBtn">Réutiliser</button>
          <button class="btn btn-soft" id="replaceSourceBtn">Remplacer source</button>
          <button class="btn btn-soft" id="favCorrectedBtn">Favori</button>
          <button class="btn btn-soft" id="exportTxtBtn">Exporter .txt</button>
          <button class="btn btn-soft" id="exportMdBtn">Exporter .md</button>
        </div>
      </article>

      <article class="result-block" id="variantsBlock">
        <h4>Variantes</h4>
        <div id="variantsList"></div>
      </article>
    </section>

    <section id="comparePanel" class="compare" hidden>
      <header>
        <h3>Comparaison</h3>
        <button class="btn btn-tiny" id="closeCompareBtn">Fermer</button>
      </header>
      <div class="compare-grid">
        <div>
          <h5>Source</h5>
          <div id="compareSource" class="text-box"></div>
        </div>
        <div>
          <h5>Cible</h5>
          <div id="compareTarget" class="text-box"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<div id="toast" class="toast"></div>
<script type="module" src="app.js"></script>
</body>
</html>
